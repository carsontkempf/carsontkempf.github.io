[build]
  command = "bundle install && chmod +x scripts/build.sh && JEKYLL_ENV=production ./scripts/build.sh"
  publish = "_site"

[build.environment]
  # Omit client-side environment variables from secrets scanning
  # These values are meant to be public and are exposed in client-side JavaScript
  # DO NOT add GITHUB_PAT or APPLE_P8_KEY here - those are server-side secrets
  SECRETS_SCAN_OMIT_KEYS = "AUTH0_DOMAIN,AUTH0_CLIENT_ID,AUTH0_AUDIENCE_SERVER,AUTH0_CALLBACK_URL,SPOTIFY_CLIENT_ID,SPOTIFY_CALLBACK_URL,APPLE_TEAM_ID,APPLE_KEY_ID"

[functions]
  directory = "netlify/functions"

# Production context uses production environment variables
[context.production]
  command = "bundle install && chmod +x scripts/build.sh && JEKYLL_ENV=production ./scripts/build.sh"

# Branch deploys use dev environment variables
[context.branch-deploy]
  command = "bundle install && JEKYLL_ENV=production bundle exec jekyll build --config _config.yml,_config-dev.yml"

# Deploy previews use dev environment variables
[context.deploy-preview]
  command = "bundle install && JEKYLL_ENV=production bundle exec jekyll build --config _config.yml,_config-dev.yml"

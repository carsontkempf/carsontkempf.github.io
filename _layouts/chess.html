<!DOCTYPE html>
<html lang="en-US">
  {% include widgets/header/head.html %}
  <body>
    <aside class="sidebar">
      {% include widgets/sidebar/sidebar.html %}
    </aside>

    {% include components/ui/sidebar-toggle.html %}

    <div class="page-content">
      <header class="header">
        {% include widgets/header/main.html %}
      </header>

      <div class="wrapper">
        <main class="main-content">
          {{ content }}
        </main>
        <footer class="footer">
          {% include widgets/footer/footer.html %}
        </footer>
      </div>
    </div>

    <!-- Chess Dependencies -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/chess.css' | relative_url }}">

    <!-- Stockfish Engine (for local fallback) -->
    <script src="{{ '/assets/js/chess/loadEngine.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/chess/stockfish-engine.js' | relative_url }}"></script>

    <!-- Auth0 SDK (optional - for Lichess API) -->
    <script>
      // Initialize global auth0Client as null so code can check for it
      window.auth0Client = null;
      console.log('[CHESS LAYOUT] Auth0 client initialized as null (authentication disabled)');
      console.log('[CHESS LAYOUT] Chess will use local Stockfish engine');
    </script>

    <!-- Chess Modules -->
    <script type="module" src="{{ '/assets/js/chess/core/chess-wrapper.js' | relative_url }}"></script>
    <script type="module" src="{{ '/assets/js/chess/ui/board-manager.js' | relative_url }}"></script>
    <script type="module" src="{{ '/assets/js/chess/ui/game-manager.js' | relative_url }}"></script>
    <script type="module" src="{{ '/assets/js/chess/ui/controls.js' | relative_url }}"></script>
    <script type="module" src="{{ '/assets/js/chess/api/lichess-client.js' | relative_url }}"></script>
    <script type="module" src="{{ '/assets/js/chess/core/engine-manager.js' | relative_url }}"></script>
  </body>
</html>

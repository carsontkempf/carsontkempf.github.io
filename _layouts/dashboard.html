---
layout: default
title: Dashboard
permalink: /dashboard/
---

<style>
/* Dashboard Mobile-First Responsive Design */
.dashboard-header {
    padding: clamp(1rem, 3vh, 1.5rem) 0;
    text-align: center;
}

.dashboard-header h1 {
    font-size: clamp(1.5rem, 5vw, 2rem);
    margin-bottom: clamp(0.5rem, 1.5vh, 1rem);
}

.dashboard-header .welcome-message {
    font-size: clamp(1rem, 3vw, 1.2rem);
}

.dashboard-header .login-status {
    font-size: clamp(0.9rem, 2.5vw, 1rem);
}

.dashboard-main-content {
    padding: clamp(1rem, 3vh, 2rem) 0;
}

.dashboard-buttons {
    display: flex;
    flex-direction: column;
    gap: clamp(1rem, 2.5vh, 1.5rem);
    align-items: center;
    margin: clamp(1rem, 3vh, 1.5rem) 0;
}

.dashboard-btn {
    font-size: clamp(1.1rem, 3.5vw, 1.5rem) !important;
    padding: clamp(15px, 3vh, 20px) clamp(30px, 6vw, 40px) !important;
    min-width: min(300px, 90vw) !important;
    width: 100%;
    max-width: 500px;
    text-align: center;
}

#auth-management-buttons {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: clamp(0.75rem, 2vh, 1rem);
    align-items: center;
}

#auth-management-buttons .dashboard-btn {
    width: 100%;
}

/* Mobile Breakpoint - Tablet */
@media (max-width: 768px) {
    .dashboard-buttons {
        padding: 0 clamp(1rem, 3vw, 1.5rem);
    }

    .dashboard-btn {
        max-width: 100%;
    }

    #auth-management-buttons {
        max-width: 100%;
    }
}

/* Mobile Breakpoint - Small Phone */
@media (max-width: 480px) {
    .dashboard-header h1 {
        word-wrap: break-word;
    }

    .dashboard-btn {
        font-size: clamp(1rem, 4vw, 1.3rem) !important;
        padding: clamp(12px, 2.5vh, 16px) clamp(24px, 5vw, 32px) !important;
    }
}

/* Login Prompt - Mobile Friendly */
#dashboard-login-prompt {
    padding: clamp(2rem, 5vh, 3rem);
    text-align: center;
}

#dashboard-login-prompt h2 {
    font-size: clamp(1.3rem, 4vw, 1.5rem);
    margin-bottom: clamp(0.75rem, 2vh, 1rem);
}

#dashboard-login-prompt p {
    font-size: clamp(0.95rem, 2.8vw, 1rem);
    margin-bottom: clamp(1.5rem, 3vh, 2rem);
}

.login-btn {
    font-size: clamp(1rem, 3vw, 1.1rem) !important;
    padding: clamp(12px, 2.5vh, 15px) clamp(24px, 5vw, 30px) !important;
}
</style>

<div id="dashboard-content-wrapper" style="display: none;">

  <header class="dashboard-header">
    <h1>{{ page.title }}</h1>
    <div id="user-profile-details"></div>
  </header>

  <main class="dashboard-main-content">
    <div class="dashboard-buttons">
      <a href="{{ '/spotify-apple/' | relative_url }}" class="dashboard-btn">Spotify Apple Integration</a>
      <a href="{{ '/authorization/' | relative_url }}" class="dashboard-btn">Authorization Management</a>
      <a href="{{ '/admin/' | relative_url }}" class="dashboard-btn" id="writer-admin-button" style="display: none;">Writer's Admin</a>
      <div id="auth-management-buttons">
        <!-- Buttons will be dynamically loaded based on user permissions -->
      </div>
    </div>
    </main>
</div>

<div id="dashboard-login-prompt" style="display: none;">
    <h2>Access Denied</h2>
    <p>You must be logged in to view this page.</p>
    <button onclick="authService.login()" class="login-btn">Log In</button>
</div>

<script>
    console.log('[LAYOUT DEBUG] dashboard.html layout script loaded');
    console.log('[LAYOUT DEBUG] Dashboard elements check:');
    console.log('[LAYOUT DEBUG] - dashboard-content-wrapper:', document.getElementById('dashboard-content-wrapper'));
    console.log('[LAYOUT DEBUG] - dashboard-login-prompt:', document.getElementById('dashboard-login-prompt'));

    document.addEventListener('authReady', () => {
        console.log('[LAYOUT DEBUG] authReady event received in layout');
        console.log('[LAYOUT DEBUG] window.authService:', window.authService);
        console.log('[LAYOUT DEBUG] isAuthenticated:', window.authService?.isAuthenticated);

        if (window.authService.isAuthenticated) {
            console.log('[LAYOUT DEBUG] User authenticated - showing dashboard content');
            document.getElementById('dashboard-content-wrapper').style.display = 'block';

            const user = window.authService.user;
            console.log('[LAYOUT DEBUG] User object:', user);

            const profileDiv = document.getElementById('user-profile-details');
            console.log('[LAYOUT DEBUG] Profile div:', profileDiv);

            if (user && profileDiv) {
                console.log('[LAYOUT DEBUG] Injecting user profile HTML');
                // This injects HTML with the correct classes to match our CSS
                profileDiv.innerHTML = `
                    <p class="welcome-message">Welcome, ${user.name}!</p>
                    <p class="login-status">Your login status is confirmed.</p>
                `;
            }

            // Load appropriate buttons based on user permissions
            console.log('[LAYOUT DEBUG] Loading dashboard buttons');
            loadDashboardButtons(user);
        } else {
            console.log('[LAYOUT DEBUG] User NOT authenticated - showing login prompt');
            document.getElementById('dashboard-login-prompt').style.display = 'block';
        }
    });

    function loadDashboardButtons(user) {
        console.log('[BUTTONS DEBUG] loadDashboardButtons called with user:', user);

        const authButtonsDiv = document.getElementById('auth-management-buttons');
        const writerAdminButton = document.getElementById('writer-admin-button');

        console.log('[BUTTONS DEBUG] Button elements:');
        console.log('[BUTTONS DEBUG] - authButtonsDiv:', authButtonsDiv);
        console.log('[BUTTONS DEBUG] - writerAdminButton:', writerAdminButton);

        // Check user roles in multiple possible locations
        const customRoles = user['https://carsontkempf.github.io/roles'] || [];
        const auth0Roles = user['https://auth0.com/roles'] || [];
        const appMetadataRoles = user.app_metadata?.roles || [];
        const userMetadataRoles = user.user_metadata?.roles || [];

        console.log('[BUTTONS DEBUG] Role sources:');
        console.log('[BUTTONS DEBUG] - customRoles:', customRoles);
        console.log('[BUTTONS DEBUG] - auth0Roles:', auth0Roles);
        console.log('[BUTTONS DEBUG] - appMetadataRoles:', appMetadataRoles);
        console.log('[BUTTONS DEBUG] - userMetadataRoles:', userMetadataRoles);

        // Combine all possible role sources
        const allRoles = [...customRoles, ...auth0Roles, ...appMetadataRoles, ...userMetadataRoles];
        console.log('[BUTTONS DEBUG] All combined roles:', allRoles);

        const hasAdminRole = allRoles.includes('admin') || allRoles.includes('Admin');
        const hasWriterRole = allRoles.includes('writer') || allRoles.includes('Writer');
        const hasCodeComprehensionRole = allRoles.includes('Code-Comprehension-Project') ||
                                        allRoles.includes('rol_XUUh9ZOhirY2yCQQ');
        const isSiteOwner = user.email === 'ctkfdp@umsystem.edu';

        console.log('[BUTTONS DEBUG] Role checks:');
        console.log('[BUTTONS DEBUG] - hasAdminRole:', hasAdminRole);
        console.log('[BUTTONS DEBUG] - hasWriterRole:', hasWriterRole);
        console.log('[BUTTONS DEBUG] - hasCodeComprehensionRole:', hasCodeComprehensionRole);
        console.log('[BUTTONS DEBUG] - isSiteOwner:', isSiteOwner);

        // Show Writer's Admin button for Admin or Writer roles
        if (hasAdminRole || hasWriterRole || isSiteOwner) {
            console.log('[BUTTONS DEBUG] User has writer/admin access - showing Writer Admin button');
            if (writerAdminButton) {
                writerAdminButton.style.display = 'inline-block';
                console.log('[BUTTONS DEBUG] Writer Admin button display set to inline-block');
            } else {
                console.log('[BUTTONS DEBUG] WARNING: writerAdminButton element not found!');
            }
        } else {
            console.log('[BUTTONS DEBUG] User does NOT have writer/admin access');
        }

        // Additional admin-specific buttons can be added here if needed
        // Currently no additional dynamic buttons for admins
        console.log('[BUTTONS DEBUG] loadDashboardButtons complete');
    }
</script>

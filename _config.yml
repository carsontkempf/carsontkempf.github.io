# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Carson's Meditations
email: ctkfdp@umsystem.edu
description: >- # this means to ignore newlines until "baseurl:"
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://carsontkempf.github.io" # the base hostname & protocol for your site, e.g. http://example.com
repository: "carsontkempf/carsontkempf.github.io"
github_username:  carsontkempf
author: Carson Kempf

safe: false
show_downloads: false
google_analytics: "G-DSMK52452T"
theme: jekyll-theme-minimal
sass:
  sass_dir: _sass

# Disable plugins that cause SSL timeouts
plugins:
  - jekyll-feed

# Explicitly disable github-metadata to prevent SSL timeout
github: [metadata]

# Collections configuration
collections:
  pages:
    output: true
    permalink: /:path/

# Process .liquid files as JavaScript
defaults:
  - scope:
      path: "assets/js"
    values:
      layout: null
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "page"

# Include .liquid files in processing
include:
  - assets/js/*.liquid
  - .well-known
  - _headers

# API Configuration
# These placeholders are overridden by _config-dev.yml (local) or _config-prod.yml (Netlify)
# Do not hardcode secrets here - use environment-specific config files
auth0:
  domain: "${AUTH0_DOMAIN}"
  client_id: "${AUTH0_CLIENT_ID}"
  audience: "${AUTH0_AUDIENCE_SERVER}"

spotify:
  client_id: "${SPOTIFY_CLIENT_ID}"

apple_music:
  team_id: "${APPLE_TEAM_ID}"
  key_id: "${APPLE_KEY_ID}"
  developer_token: "${APPLE_MUSIC_DEVELOPER_TOKEN}"

# Exclude files from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - _config-prod-env.yml
  - scripts/
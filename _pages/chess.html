<link rel="stylesheet" href="/assets/css/vendor/chessboard-1.0.0.min.css">
<link rel="stylesheet" href="/assets/css/chess-analysis.css">

<style>
  .page-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .page-header h1 {
    margin-bottom: 10px;
  }

  .page-header p {
    color: #666;
    font-size: 16px;
  }

  .settings-panel {
    max-width: 1400px;
    margin: 20px auto;
    padding: 15px;
    background-color: #fff;
    border: 1px solid #ddd;
    border-radius: 4px;
  }

  .settings-row {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    margin: 10px 0;
  }

  .setting-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .setting-item label {
    font-weight: 500;
    white-space: nowrap;
  }

  .setting-item select,
  .setting-item input {
    padding: 5px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
  }

  .game-info {
    max-width: 1400px;
    margin: 20px auto;
    padding: 15px;
    background-color: #f5f5f5;
    border-radius: 4px;
    text-align: center;
  }

  #game-status {
    font-size: 16px;
    font-weight: 500;
    color: #333;
  }

  #loading-message {
    text-align: center;
    padding: 60px 20px;
    font-size: 18px;
    color: #666;
  }

  #chess-board {
    width: 600px;
    height: 600px;
  }
</style>

<div class="page-header">
  <h1>Chess Analysis Board</h1>
  <p>Play against Stockfish 17 or analyze positions with real-time evaluation</p>
</div>

<div id="loading-message">
  <p>Loading chess engine...</p>
</div>

<div id="chess-game" style="display: none;">
  <div class="settings-panel">
    <div class="settings-row">
      <div class="setting-item">
        <label for="mode-select">Mode:</label>
        <select id="mode-select">
          <option value="play">Play vs Engine</option>
          <option value="analysis" selected>Analysis</option>
        </select>
      </div>
      <div class="setting-item">
        <label for="color-select">Board Orientation:</label>
        <select id="color-select">
          <option value="white" selected>White</option>
          <option value="black">Black</option>
        </select>
      </div>
      <div class="setting-item">
        <label for="skill-level">Engine Strength:</label>
        <input type="range" id="skill-level" min="0" max="20" value="15" style="width: 150px;">
        <span id="skill-level-value">15</span>
      </div>
    </div>
  </div>

  <div class="game-info">
    <div id="game-status">White to move</div>
  </div>

  <div class="chess-analysis-container">
    <div class="chess-board-section">
      <div class="chess-board-with-eval">
        <div id="eval-bar"></div>
        <div id="chess-board"></div>
      </div>
    </div>

    <div class="analysis-panel">
      <div class="analysis-panel-header">
        <h3>Engine Analysis</h3>
      </div>
      <div id="analysis-panel"></div>
    </div>
  </div>

  <div class="controls-panel">
    <button id="new-game-btn">New Game</button>
    <button id="undo-btn">Undo Move</button>
    <button id="flip-board-btn">Flip Board</button>
    <button id="toggle-mode-btn" class="secondary">Play Mode</button>
    <button id="generate-report-btn" class="primary">Generate Report</button>
  </div>

  <div id="report-panel" style="display: none;">
    <div class="report-panel-header">
      <h3>Game Report</h3>
      <button id="close-report-btn">Close</button>
    </div>
    <div id="report-progress" style="display: none;">
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <p id="progress-text">Analyzing moves...</p>
    </div>
    <div id="report-content"></div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/assets/js/vendor/chessboard-1.0.0.min.js"></script>
<script src="/assets/js/chess/chess.min.js"></script>
<script src="/assets/js/chess/loadEngine.js"></script>
<script src="/assets/js/chess/stockfish-engine.js"></script>
<script src="/assets/js/chess/eval-bar.js"></script>
<script src="/assets/js/chess/game-report-scoring.js"></script>
<script src="/assets/js/chess/game-report-generator.js"></script>
<script src="/assets/js/chess/chess-analysis-controller.js"></script>

<script>
(function() {
  'use strict';

  var chessController;

  function initChess() {
    var modeSelect = document.getElementById('mode-select');
    var mode = modeSelect.value;

    chessController = new ChessAnalysisController({
      boardElement: 'chess-board',
      statusElement: 'game-status',
      evalBarElement: 'eval-bar',
      analysisElement: 'analysis-panel',
      playerColor: 'white',
      mode: mode,
      skillLevel: 15,
      depth: 20,
      pieceTheme: '/assets/img/chesspieces/wikipedia/{piece}.png'
    });

    chessController.init();

    document.getElementById('loading-message').style.display = 'none';
    document.getElementById('chess-game').style.display = 'block';
  }

  document.addEventListener('DOMContentLoaded', function() {
    var modeSelect = document.getElementById('mode-select');
    modeSelect.addEventListener('change', function() {
      location.reload();
    });

    var colorSelect = document.getElementById('color-select');
    colorSelect.addEventListener('change', function() {
      if (chessController) {
        chessController.setPlayerColor(this.value);
      }
    });

    var skillLevelSlider = document.getElementById('skill-level');
    var skillLevelValue = document.getElementById('skill-level-value');
    skillLevelSlider.addEventListener('input', function() {
      skillLevelValue.textContent = this.value;
      if (chessController) {
        chessController.setSkillLevel(parseInt(this.value, 10));
      }
    });

    var closeReportBtn = document.getElementById('close-report-btn');
    if (closeReportBtn) {
      closeReportBtn.addEventListener('click', function() {
        var reportPanel = document.getElementById('report-panel');
        if (reportPanel) {
          reportPanel.style.display = 'none';
        }
      });
    }

    initChess();
  });
})();
</script>

<link rel="stylesheet" href="/assets/css/practice-tests.css">

<script>
  var QUIZ_DATA = {
    "awsServiceDefs":     {{ site.data['practice-tests']['aws-ccp-service-definitions'] | jsonify }},
    "awsCcpIntro":        {{ site.data['practice-tests']['aws-ccp-intro-questions'] | jsonify }},
    "cloudPractitioner1": {{ site.data['practice-tests']['cloudPractitioner1'] | jsonify }},
    "cloudPractitioner2": {{ site.data['practice-tests']['cloudPractitioner2'] | jsonify }},
    "cloudPractitioner3": {{ site.data['practice-tests']['cloudPractitioner3'] | jsonify }},
    "cloudPractitioner4": {{ site.data['practice-tests']['cloudPractitioner4'] | jsonify }},
    "cloudPractitioner5": {{ site.data['practice-tests']['cloudPractitioner5'] | jsonify }}
  };

  var QUIZ_SUBJECTS = [
    {
      key: "aws-ccp",
      label: "AWS Certified Cloud Practitioner",
      image: "/assets/img/aws.jpeg",
      sets: [
        { key: "awsServiceDefs",     label: "AWS Service Definitions", difficulty: "easy" },
        { key: "awsCcpIntro",        label: "Intro Questions",         difficulty: "medium" },
        { key: "cloudPractitioner1", label: "Practice Test 1",         difficulty: "hard" },
        { key: "cloudPractitioner2", label: "Practice Test 2",         difficulty: "hard" },
        { key: "cloudPractitioner3", label: "Practice Test 3",         difficulty: "hard" },
        { key: "cloudPractitioner4", label: "Practice Test 4",         difficulty: "hard" },
        { key: "cloudPractitioner5", label: "Practice Test 5",         difficulty: "hard" }
      ]
    }
  ];
</script>

<!-- STATE: subject selection -->
<div id="pt-subject" class="pt-container">
  <div class="pt-subject-card">
    <h2 class="pt-landing-title">Practice Tests</h2>
    <p class="pt-landing-subtitle">Choose a subject</p>
    <div id="pt-subject-grid" class="pt-subject-grid">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<!-- STATE: test set selection -->
<div id="pt-select" class="pt-container" style="display:none;">
  <div class="pt-select-card">
    <button id="pt-back-btn" class="pt-btn pt-btn-ghost pt-back-btn">&larr; Back</button>
    <h2 id="pt-select-title" class="pt-landing-title"></h2>
    <p class="pt-landing-subtitle">Select a test</p>

    <div id="pt-radio-group" class="pt-radio-group">
      <!-- populated by JS -->
    </div>

    <div class="pt-select-footer">
      <label class="pt-toggle-wrap" for="pt-randomize">
        <span>Randomize questions</span>
        <span class="pt-toggle-switch">
          <input type="checkbox" id="pt-randomize" checked>
          <span class="pt-toggle-slider"></span>
        </span>
      </label>
      <button id="pt-start-btn" class="pt-btn pt-btn-primary" disabled>Start</button>
    </div>
  </div>
</div>

<!-- STATE: question -->
<div id="pt-question" class="pt-container" style="display:none;">
  <div class="pt-question-header">
    <span id="pt-progress-text" class="pt-progress-text">Question 1 of 1</span>
    <span id="pt-timer" class="pt-timer">0:00</span>
    <button id="pt-quit-btn" class="pt-btn pt-btn-ghost">Quit</button>
  </div>
  <div class="pt-progress-bar-wrap">
    <div id="pt-progress-bar" class="pt-progress-bar"></div>
  </div>

  <div class="pt-question-card">
    <p id="pt-type-badge" class="pt-type-badge"></p>
    <span id="pt-domain-badge" class="pt-domain-badge" style="display:none;"></span>
    <p id="pt-question-text" class="pt-question-text"></p>
    <div id="pt-choices" class="pt-choices"></div>
    <div id="pt-result-banner" class="pt-result-banner" style="display:none;"></div>
    <div id="pt-explanation" class="pt-explanation" style="display:none;"></div>
    <div class="pt-question-actions">
      <button id="pt-submit-btn" class="pt-btn pt-btn-primary" disabled>Submit</button>
      <button id="pt-next-btn" class="pt-btn pt-btn-secondary" style="display:none;">Next</button>
    </div>
  </div>

  <p class="pt-keyboard-hint">
    <kbd>1</kbd>-<kbd>5</kbd> select &bull;
    <kbd>Enter</kbd> submit / next &bull;
    <kbd>&rarr;</kbd> next &bull;
    <kbd>Esc</kbd> quit
  </p>
</div>

<!-- STATE: summary -->
<div id="pt-summary" class="pt-container" style="display:none;">
  <div class="pt-summary-card">
    <h2 id="pt-summary-title" class="pt-summary-title">Quiz Complete</h2>
    <p id="pt-summary-set-label" class="pt-summary-set-label"></p>
    <div class="pt-summary-stats">
      <div class="pt-stat-block">
        <span id="pt-stat-accuracy" class="pt-stat-value">0%</span>
        <span class="pt-stat-label">Accuracy</span>
      </div>
      <div class="pt-stat-block">
        <span id="pt-stat-correct" class="pt-stat-value">0/0</span>
        <span class="pt-stat-label">Correct</span>
      </div>
      <div class="pt-stat-block">
        <span id="pt-stat-time" class="pt-stat-value">0:00</span>
        <span class="pt-stat-label">Time</span>
      </div>
    </div>
    <div class="pt-summary-actions">
      <button id="pt-restart-btn" class="pt-btn pt-btn-primary">Try Again</button>
      <button id="pt-home-btn" class="pt-btn pt-btn-ghost">Choose Another Test</button>
    </div>
  </div>
</div>

<script src="/assets/js/practice-tests/quiz-engine.js"></script>
<script src="/assets/js/practice-tests/question-renderer.js"></script>
<script src="/assets/js/practice-tests/keyboard-handler.js"></script>

<script>
(function() {
  'use strict';

  var activeSubject = null;

  function selectSubject(subject) {
    activeSubject = subject;
    document.getElementById('pt-select-title').textContent = subject.label;
    QuestionRenderer.renderRadioButtons(subject.sets);
    document.getElementById('pt-start-btn').disabled = true;
    QuestionRenderer.showState('select');
  }

  function startQuiz() {
    var checked = document.querySelector('input[name="pt-set"]:checked');
    if (!checked) return;
    var key = checked.value;
    var randomize = document.getElementById('pt-randomize').checked;
    var labelEl = checked.closest('label');
    var label = labelEl ? labelEl.querySelector('.pt-radio-label').textContent : key;

    QuizEngine.startQuiz(key, randomize, label);

    if (QuizEngine.state.total === 0) {
      alert('No questions found for this set.');
      return;
    }

    QuestionRenderer.showState('question');
    KeyboardHandler.enable();
    QuestionRenderer.render(QuizEngine.currentQuestion(), 0, QuizEngine.state.total);
  }

  function handleSubmit() {
    var result = QuizEngine.submitAnswer();
    if (!result) return;
    QuestionRenderer.showResult(result.question, result.isCorrect, result.selected);
  }

  function handleNext() {
    var hasMore = QuizEngine.nextQuestion();
    if (hasMore) {
      QuestionRenderer.render(
        QuizEngine.currentQuestion(),
        QuizEngine.state.currentIndex,
        QuizEngine.state.total
      );
    } else {
      QuizEngine.stopTimer();
      var summary = QuizEngine.getSummary();
      QuestionRenderer.renderSummary(summary);
      QuestionRenderer.showState('summary');
      KeyboardHandler.disable();
    }
  }

  function quit() {
    QuizEngine.stopTimer();
    KeyboardHandler.disable();
    QuestionRenderer.showState('select');
  }

  function init() {
    QuestionRenderer.renderSubjects(QUIZ_SUBJECTS, selectSubject);
    QuestionRenderer.showState('subject');

    document.getElementById('pt-back-btn').addEventListener('click', function() {
      QuestionRenderer.showState('subject');
    });
    document.getElementById('pt-start-btn').addEventListener('click', startQuiz);
    document.getElementById('pt-submit-btn').addEventListener('click', handleSubmit);
    document.getElementById('pt-next-btn').addEventListener('click', handleNext);
    document.getElementById('pt-quit-btn').addEventListener('click', function() { quit(); });
    document.getElementById('pt-restart-btn').addEventListener('click', function() {
      if (activeSubject) selectSubject(activeSubject);
      else QuestionRenderer.showState('select');
    });
    document.getElementById('pt-home-btn').addEventListener('click', function() {
      QuestionRenderer.showState('subject');
    });
  }

  window.QuizApp = { quit: quit };

  document.addEventListener('DOMContentLoaded', init);
})();
</script>

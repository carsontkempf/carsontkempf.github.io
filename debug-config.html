---
layout: default
title: API Connection Status
---

<style>
.status-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin: 20px 0;
}

.status-card {
    border: 2px solid #ddd;
    border-radius: 8px;
    padding: 20px;
    background: #f9f9f9;
}

.status-card.connected {
    border-color: #28a745;
    background: #d4edda;
}

.status-card.disconnected {
    border-color: #dc3545;
    background: #f8d7da;
}

.status-card.warning {
    border-color: #ffc107;
    background: #fff3cd;
}

.status-indicator {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 8px;
}

.status-indicator.green {
    background-color: #28a745;
}

.status-indicator.red {
    background-color: #dc3545;
}

.status-indicator.yellow {
    background-color: #ffc107;
}

.config-details {
    margin-top: 15px;
    font-size: 0.9em;
}

.config-details ul {
    list-style: none;
    padding: 0;
}

.config-details li {
    padding: 5px 0;
    border-bottom: 1px solid rgba(0,0,0,0.1);
}

.refresh-btn {
    margin: 20px 0;
    padding: 10px 20px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.refresh-btn:hover {
    background: #0056b3;
}
</style>

<h1>API Connection Status</h1>

<button class="refresh-btn" onclick="refreshStatus()">Refresh Status</button>

<div id="debug-output"></div>

<script>
async function refreshStatus() {
    const output = document.getElementById('debug-output');
    output.innerHTML = '<p>Loading API connection status...</p>';

    // Wait for auth and config to be ready
    await new Promise(resolve => {
        const checkReady = () => {
            if (window.authService && window.envConfig && window.envConfig.initialized) {
                resolve();
            } else {
                setTimeout(checkReady, 100);
            }
        };
        checkReady();
    });

    const statuses = {
        auth0: { name: 'Auth0 Authentication', status: 'checking', details: {} },
        spotify: { name: 'Spotify API', status: 'checking', details: {} },
        appleMusic: { name: 'Apple Music API', status: 'checking', details: {} },
        netlifyFunctions: { name: 'Netlify Functions', status: 'checking', details: {} }
    };

    // Check Auth0
    try {
        const auth0Config = window.envConfig.getAuth0Config();
        statuses.auth0.details.domain = auth0Config.domain;
        statuses.auth0.details.clientId = auth0Config.client_id;
        statuses.auth0.details.audience = auth0Config.audience;
        statuses.auth0.details.authenticated = window.authService?.isAuthenticated || false;
        statuses.auth0.details.userEmail = window.authService?.user?.email || 'Not logged in';
        statuses.auth0.details.userRoles = window.authService?.roles || [];

        if (auth0Config.domain && auth0Config.client_id && !auth0Config.domain.includes('${')) {
            statuses.auth0.status = 'connected';
        } else {
            statuses.auth0.status = 'disconnected';
            statuses.auth0.error = 'Configuration incomplete or invalid';
        }
    } catch (error) {
        statuses.auth0.status = 'disconnected';
        statuses.auth0.error = error.message;
    }

    // Check Spotify
    try {
        const spotifyConfig = window.envConfig.getSpotifyConfig();
        statuses.spotify.details.clientId = spotifyConfig.client_id;
        statuses.spotify.details.callbackUrl = spotifyConfig.callback_url;
        statuses.spotify.details.authorized = window.spotifyService?.isAuthorized || false;
        statuses.spotify.details.hasAccessToken = !!window.spotifyService?.accessToken;

        if (window.spotifyService?.isAuthorized) {
            statuses.spotify.status = 'connected';
            try {
                const profile = await window.spotifyService.getUserProfile();
                statuses.spotify.details.username = profile.display_name || profile.id;
            } catch (err) {
                statuses.spotify.details.profileError = err.message;
            }
        } else if (spotifyConfig.client_id && !spotifyConfig.client_id.includes('${')) {
            statuses.spotify.status = 'warning';
            statuses.spotify.message = 'Configured but not authorized';
        } else {
            statuses.spotify.status = 'disconnected';
            statuses.spotify.error = 'Configuration incomplete';
        }
    } catch (error) {
        statuses.spotify.status = 'disconnected';
        statuses.spotify.error = error.message;
    }

    // Check Apple Music
    try {
        const appleMusicConfig = window.envConfig.getAppleMusicConfig();
        statuses.appleMusic.details.hasDeveloperToken = !!appleMusicConfig?.developer_token;
        statuses.appleMusic.details.initialized = window.appleMusicService?.isInitialized || false;
        statuses.appleMusic.details.authorized = window.appleMusicService?.isAuthorized || false;

        if (window.appleMusicService?.isAuthorized) {
            statuses.appleMusic.status = 'connected';
        } else if (window.appleMusicService?.isInitialized) {
            statuses.appleMusic.status = 'warning';
            statuses.appleMusic.message = 'Initialized but not authorized';
        } else if (appleMusicConfig?.developer_token) {
            statuses.appleMusic.status = 'warning';
            statuses.appleMusic.message = 'Configured but not initialized';
        } else {
            statuses.appleMusic.status = 'disconnected';
            statuses.appleMusic.error = 'No developer token configured';
        }
    } catch (error) {
        statuses.appleMusic.status = 'disconnected';
        statuses.appleMusic.error = error.message;
    }

    // Check Netlify Functions
    try {
        const response = await fetch('/.netlify/functions/get-api-key');
        if (response.ok) {
            statuses.netlifyFunctions.status = 'connected';
            const data = await response.json();
            statuses.netlifyFunctions.details.functionsWorking = true;
            statuses.netlifyFunctions.details.returnedKeys = Object.keys(data);
        } else {
            statuses.netlifyFunctions.status = 'warning';
            statuses.netlifyFunctions.message = `HTTP ${response.status}`;
        }
    } catch (error) {
        statuses.netlifyFunctions.status = 'disconnected';
        statuses.netlifyFunctions.error = error.message;
    }

    // Render status cards
    let html = '<div class="status-grid">';

    for (const [key, service] of Object.entries(statuses)) {
        const statusClass = service.status;
        const indicatorClass = service.status === 'connected' ? 'green' :
                              service.status === 'warning' ? 'yellow' : 'red';

        html += `
            <div class="status-card ${statusClass}">
                <h3>
                    <span class="status-indicator ${indicatorClass}"></span>
                    ${service.name}
                </h3>
                <p><strong>Status:</strong> ${service.status.toUpperCase()}</p>
                ${service.message ? `<p>${service.message}</p>` : ''}
                ${service.error ? `<p style="color: red;"><strong>Error:</strong> ${service.error}</p>` : ''}
                <div class="config-details">
                    <strong>Details:</strong>
                    <ul>
                        ${Object.entries(service.details).map(([k, v]) =>
                            `<li><strong>${k}:</strong> ${typeof v === 'object' ? JSON.stringify(v) : v}</li>`
                        ).join('')}
                    </ul>
                </div>
            </div>
        `;
    }

    html += '</div>';

    // Overall system status
    const allConnected = Object.values(statuses).every(s => s.status === 'connected');
    const anyDisconnected = Object.values(statuses).some(s => s.status === 'disconnected');

    html += '<h2>Overall System Status</h2>';
    if (allConnected) {
        html += '<p style="color: green; font-size: 1.2em;">All systems operational</p>';
    } else if (anyDisconnected) {
        html += '<p style="color: red; font-size: 1.2em;">Some systems disconnected - check configuration</p>';
    } else {
        html += '<p style="color: orange; font-size: 1.2em;">System partially configured - authorization may be needed</p>';
    }

    // Environment info
    html += `
        <h2>Environment Information</h2>
        <ul>
            <li><strong>Hostname:</strong> ${window.location.hostname}</li>
            <li><strong>Is Production:</strong> ${window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1'}</li>
            <li><strong>Config Ready:</strong> ${window.envConfig.isReady()}</li>
            <li><strong>Auth Ready:</strong> ${!!window.authService}</li>
        </ul>
    `;

    output.innerHTML = html;
}

// Auto-run on page load
document.addEventListener('DOMContentLoaded', () => {
    // Wait a bit for services to initialize
    setTimeout(refreshStatus, 1000);
});

// Also refresh when auth is ready
document.addEventListener('authReady', () => {
    setTimeout(refreshStatus, 500);
});
</script>

# Production Configuration
# Environment variables from Netlify

auth0:
  domain: "${AUTH0_DOMAIN}"
  client_id: "${AUTH0_CLIENT_ID}"
  audience: "${AUTH0_AUDIENCE_SERVER}"
  callback_url: "${AUTH0_CALLBACK_URL}"

spotify:
  client_id: "${SPOTIFY_CLIENT_ID}"

apple_music:
  team_id: "${APPLE_TEAM_ID}"
  key_id: "${APPLE_KEY_ID}"
  developer_token: "${APPLE_MUSIC_DEVELOPER_TOKEN}"
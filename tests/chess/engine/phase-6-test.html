<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase 6 Tests - Transposition Table & Advanced Features</title>
  <style>
    body {
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    h1 {
      color: #4ec9b0;
      border-bottom: 2px solid #4ec9b0;
      padding-bottom: 10px;
    }
    h2 {
      color: #569cd6;
      margin-top: 30px;
    }
    .controls {
      margin: 20px 0;
      padding: 15px;
      background: #252526;
      border-radius: 5px;
    }
    button {
      background: #0e639c;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 10px;
    }
    button:hover {
      background: #1177bb;
    }
    button:disabled {
      background: #3c3c3c;
      cursor: not-allowed;
    }
    #output {
      background: #252526;
      padding: 20px;
      border-radius: 5px;
      min-height: 200px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .pass { color: #4ec9b0; }
    .fail { color: #f48771; }
    .info { color: #9cdcfe; }
    .warn { color: #dcdcaa; }
    .summary {
      margin-top: 20px;
      padding: 15px;
      background: #252526;
      border-radius: 5px;
      border-left: 4px solid #4ec9b0;
    }
    .summary.has-failures {
      border-left-color: #f48771;
    }
    .loading {
      display: inline-block;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1>Phase 6 Test Suite</h1>
  <p class="info">Tests for Transposition Table, Move Ordering, and Null Move Pruning</p>

  <div class="controls">
    <button id="runBtn" onclick="runTests()">Run All Tests</button>
    <button id="clearBtn" onclick="clearOutput()">Clear Output</button>
    <span id="status"></span>
  </div>

  <div id="output">Ready to run tests. Click "Run All Tests" to begin.</div>

  <script type="module">
    import { runPhase6Tests } from './tt-test.js';

    window.runTests = async function() {
      const runBtn = document.getElementById('runBtn');
      const status = document.getElementById('status');
      const output = document.getElementById('output');

      runBtn.disabled = true;
      status.innerHTML = '<span class="loading">⟳</span> Running tests...';
      output.innerHTML = 'Starting Phase 6 test suite...\n\n';

      // Capture console output
      const originalLog = console.log;
      const originalError = console.error;

      console.log = function(...args) {
        const message = args.join(' ');
        output.innerHTML += formatMessage(message, 'info') + '\n';
        originalLog.apply(console, args);
      };

      console.error = function(...args) {
        const message = args.join(' ');
        output.innerHTML += formatMessage(message, 'fail') + '\n';
        originalError.apply(console, args);
      };

      try {
        // Run tests
        const results = await runPhase6Tests();

        // Restore console
        console.log = originalLog;
        console.error = originalError;

        // Show summary
        const passRate = ((results.passed / (results.passed + results.failed)) * 100).toFixed(1);
        const summaryClass = results.failed > 0 ? 'summary has-failures' : 'summary';

        const summaryHTML = `
<div class="${summaryClass}">
  <strong>Test Results:</strong><br>
  Total: ${results.passed + results.failed}<br>
  <span class="pass">Passed: ${results.passed} ✓</span><br>
  ${results.failed > 0 ? '<span class="fail">Failed: ' + results.failed + ' ✗</span><br>' : ''}
  Pass Rate: ${passRate}%
</div>
        `;

        output.innerHTML += '\n' + summaryHTML;
        status.innerHTML = results.failed === 0
          ? '<span class="pass">✓ All tests passed!</span>'
          : '<span class="fail">✗ Some tests failed</span>';

      } catch (error) {
        console.log = originalLog;
        console.error = originalError;
        output.innerHTML += `\n<span class="fail">ERROR: ${error.message}</span>\n`;
        output.innerHTML += `<span class="fail">${error.stack}</span>\n`;
        status.innerHTML = '<span class="fail">✗ Test suite error</span>';
      }

      runBtn.disabled = false;
    };

    window.clearOutput = function() {
      document.getElementById('output').innerHTML = 'Ready to run tests. Click "Run All Tests" to begin.';
      document.getElementById('status').innerHTML = '';
    };

    function formatMessage(message, type) {
      if (message.includes('✓') || message.includes('PASS')) {
        return `<span class="pass">${message}</span>`;
      } else if (message.includes('✗') || message.includes('FAIL')) {
        return `<span class="fail">${message}</span>`;
      } else if (message.includes('===')) {
        return `<span class="warn">${message}</span>`;
      } else if (message.includes('Total:') || message.includes('Passed:') || message.includes('Failed:')) {
        return `<strong>${message}</strong>`;
      }
      return message;
    }
  </script>
</body>
</html>
